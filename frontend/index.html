  <!-- Early Backend Wake-up (Render Cold Start Fix) -->
  <script>
    (function() {
      // Use the correct backend URL — matches VITE_API_URL env var
      const API_URL = "https://automation-f8jn.onrender.com";
      fetch(API_URL + "/api/ping").catch(() => {});
      console.log("%c[System] Backend pinged for warm-up.", "color: #6366f1; font-weight: bold;");
    })();
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Outfit', sans-serif;
    }
  </style>
  <script>
    (function () {
      var theme = localStorage.getItem("theme");
      if (theme === "light") document.documentElement.classList.remove("dark");
      else document.documentElement.classList.add("dark");
    })();
  </script>
</head>
