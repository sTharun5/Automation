<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/jpeg" href="/logo.jpg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart OD | Placement & Mentor Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <!-- Early Backend Wake-up (Render Cold Start Fix) -->
  <script>
    (function() {
      // Proactively ping the backend to start the spin-up process
      // while the browser handles the initial HTML/JS parsing.
      const API_URL = "https://automation-main.onrender.com"; // User should verify this matches Render URL
      fetch(API_URL + "/api/ping").catch(() => {});
      console.log("%c[System] Initializing Neural Link... Backend pinged.", "color: #6366f1; font-weight: bold;");
    })();
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Outfit', sans-serif;
    }
  </style>
  <script>
    (function () {
      var theme = localStorage.getItem("theme");
      if (theme === "light") document.documentElement.classList.remove("dark");
      else document.documentElement.classList.add("dark");
    })();
  </script>
</head>

<body>
  <!-- Custom Cursor Elements -->
  <div id="cursor-dot"></div>
  <div id="cursor-ring"></div>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

  <!-- Custom Cursor JS -->
  <script>
    (function () {
      const dot = document.getElementById('cursor-dot');
      const ring = document.getElementById('cursor-ring');
      if (!dot || !ring) return;

      // Skip on touch devices
      if (window.matchMedia('(pointer: coarse)').matches) return;

      let mouseX = 0, mouseY = 0;
      let ringX = 0, ringY = 0;
      let isHovering = false;

      document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        // Dot follows instantly — no lag
        dot.style.left = mouseX + 'px';
        dot.style.top = mouseY + 'px';
      });

      // Smooth ring follow with lerp (faster = more premium)
      function animate() {
        ringX += (mouseX - ringX) * 0.12;
        ringY += (mouseY - ringY) * 0.12;
        ring.style.left = ringX + 'px';
        ring.style.top = ringY + 'px';
        requestAnimationFrame(animate);
      }
      animate();

      // Hover detect on interactive elements
      document.addEventListener('mouseover', (e) => {
        const el = e.target;
        const isInteractive =
          ['BUTTON','A','INPUT','SELECT','TEXTAREA','LABEL'].includes(el.tagName) ||
          el.getAttribute('role') === 'button' ||
          el.closest('button, a, [role="button"]');
        if (isInteractive) {
          ring.classList.add('hovering');
          isHovering = true;
        }
      });

      document.addEventListener('mouseout', (e) => {
        const el = e.target;
        const isInteractive =
          ['BUTTON','A','INPUT','SELECT','TEXTAREA','LABEL'].includes(el.tagName) ||
          el.getAttribute('role') === 'button' ||
          el.closest('button, a, [role="button"]');
        if (isInteractive) {
          ring.classList.remove('hovering');
          isHovering = false;
        }
      });

      // Click flash (gold glow on both dot and ring)
      document.addEventListener('mousedown', () => {
        ring.classList.add('clicking');
        dot.classList.add('clicking');
      });
      document.addEventListener('mouseup', () => {
        ring.classList.remove('clicking');
        dot.classList.remove('clicking');
        if (isHovering) ring.classList.add('hovering');
      });

      // Hide cursor when leaving window
      document.addEventListener('mouseleave', () => {
        dot.style.opacity = '0';
        ring.style.opacity = '0';
      });
      document.addEventListener('mouseenter', () => {
        dot.style.opacity = '1';
        ring.style.opacity = '1';
      });
    })();
  </script>
</body>

</html>
